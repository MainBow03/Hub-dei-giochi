<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Game Hub</title>
    <!-- Importo Tailwind CSS per lo stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importo le icone -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Configurazione personalizzata dei colori -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#8b5cf6', // Viola stile gaming
                        secondary: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        /* Effetto scorrimento morbido */
        html { scroll-behavior: smooth; }
        
        /* Stile personalizzato per la scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animazione per le card */
        .game-card {
            transition: all 0.3s ease;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
        }
    </style>
</head>
<body class="bg-dark text-slate-200 min-h-screen font-sans selection:bg-primary selection:text-white">

    <!-- Header / Navbar -->
    <header class="sticky top-0 z-50 bg-dark/80 backdrop-blur-md border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-primary to-secondary p-2 rounded-lg text-white">
                    <i data-lucide="gamepad-2"></i>
                </div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                    My Game Arcade
                </h1>
            </div>
            
            <!-- Barra di ricerca -->
            <div class="relative w-full sm:w-72">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </div>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Cerca un gioco..." 
                    class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-xl leading-5 bg-slate-800 text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-colors"
                >
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <div class="mb-10 text-center sm:text-left">
            <h2 class="text-3xl font-extrabold text-white sm:text-4xl">
                La mia Collezione
            </h2>
            <p class="mt-3 max-w-2xl text-xl text-slate-400 sm:mt-4">
                Tutti i giochi multiplayer e single-player creati da me. Seleziona un gioco per iniziare a giocare!
            </p>
        </div>

        <!-- Griglia dei Giochi (Popolata via JavaScript) -->
        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Le card verranno inserite qui -->
        </div>

        <!-- Messaggio Nessun Risultato -->
        <div id="noResults" class="hidden text-center py-20">
            <i data-lucide="ghost" class="w-16 h-16 mx-auto text-slate-600 mb-4"></i>
            <h3 class="text-xl font-medium text-slate-300">Nessun gioco trovato</h3>
            <p class="text-slate-500 mt-2">Prova a cercare con un altro nome.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 mt-auto py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-500 text-sm">
            <p>Creato con ❤️ e Firebase. Hostato su GitHub Pages.</p>
        </div>
    </footer>

    <!-- Logica dell'applicazione -->
    <script>
        // Inizializza le icone
        lucide.createIcons();

        // ==========================================
        // 1. INSERISCI QUI I TUOI GIOCHI
        // ==========================================
        // Aggiungi, modifica o rimuovi gli elementi da questa lista.
        const myGames = [
            {
                id: 1,
                title: "Space Shooter Pro",
                description: "Uno sparatutto spaziale multiplayer. Batti il record dei tuoi amici!",
                url: "https://tuo-username.github.io/space-shooter", // Sostituisci con il vero link
                emoji: "🚀",
                tags: ["Multiplayer", "Firebase", "Azione"],
                color: "from-blue-500 to-cyan-400"
            },
            {
                id: 2,
                title: "Tris Online",
                description: "Il classico gioco del Tris ma connesso al cloud per sfidare chiunque.",
                url: "https://tuo-username.github.io/tris-online",
                emoji: "❌",
                tags: ["Board Game", "Firestore"],
                color: "from-red-500 to-orange-400"
            },
            {
                id: 3,
                title: "Chat & Draw",
                description: "Disegna e indovina in tempo reale con altri giocatori in una stanza condivisa.",
                url: "https://tuo-username.github.io/chat-draw",
                emoji: "🎨",
                tags: ["Multiplayer", "Creativo"],
                color: "from-purple-500 to-pink-400"
            },
            {
                id: 4,
                title: "Clicker Heroes",
                description: "Salva i tuoi progressi su Firestore in questo gioco incrementale infinito.",
                url: "https://tuo-username.github.io/clicker-game",
                emoji: "🖱️",
                tags: ["Single Player", "Salvataggio Cloud"],
                color: "from-green-500 to-emerald-400"
            },
             {
                id: 5,
                title: "Quiz Patente",
                description: "Sfida i tuoi amici a chi sa più regole stradali. Dati in tempo reale.",
                url: "#",
                emoji: "🚗",
                tags: ["Quiz", "Firebase"],
                color: "from-yellow-500 to-amber-400"
            }
        ];

        // Riferimenti agli elementi del DOM
        const gridContainer = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const noResultsMsg = document.getElementById('noResults');

        // Funzione per generare l'HTML dei tag
        function generateTags(tags) {
            return tags.map(tag => 
                `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-800 text-slate-300 border border-slate-700">
                    ${tag}
                </span>`
            ).join('');
        }

        // Funzione per renderizzare le card dei giochi
        function renderGames(gamesToRender) {
            gridContainer.innerHTML = ''; // Pulisce la griglia

            if (gamesToRender.length === 0) {
                gridContainer.classList.add('hidden');
                noResultsMsg.classList.remove('hidden');
                return;
            }

            gridContainer.classList.remove('hidden');
            noResultsMsg.classList.add('hidden');

            gamesToRender.forEach(game => {
                const card = document.createElement('a');
                card.href = game.url;
                card.target = "_blank"; // Apre in una nuova scheda
                card.className = "game-card bg-card rounded-2xl border border-slate-700 overflow-hidden flex flex-col h-full group relative";
                
                card.innerHTML = `
                    <!-- Top accent line -->
                    <div class="h-2 w-full bg-gradient-to-r ${game.color}"></div>
                    
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <div class="text-4xl bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-inner">
                                ${game.emoji}
                            </div>
                            <div class="text-slate-500 group-hover:text-primary transition-colors">
                                <i data-lucide="external-link" class="w-5 h-5"></i>
                            </div>
                        </div>
                        
                        <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors">
                            ${game.title}
                        </h3>
                        
                        <p class="text-slate-400 text-sm mb-6 flex-grow">
                            ${game.description}
                        </p>
                        
                        <div class="flex flex-wrap gap-2 mt-auto">
                            ${generateTags(game.tags)}
                        </div>
                    </div>
                    <!-- Hover overlay -->
                    <div class="absolute inset-0 bg-gradient-to-t from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                `;
                gridContainer.appendChild(card);
            });

            // Re-inizializza le icone per i nuovi elementi DOM
            lucide.createIcons();
        }

        // Inizializza la visualizzazione iniziale
        renderGames(myGames);

        // Gestione della barra di ricerca
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredGames = myGames.filter(game => {
                return game.title.toLowerCase().includes(searchTerm) || 
                       game.description.toLowerCase().includes(searchTerm) ||
                       game.tags.some(tag => tag.toLowerCase().includes(searchTerm));
            });
            renderGames(filteredGames);
        });

    </script>
</body>
</html>
